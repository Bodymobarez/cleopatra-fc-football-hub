[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API → Netlify Function (must come BEFORE the SPA catch-all)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA: React Router fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
